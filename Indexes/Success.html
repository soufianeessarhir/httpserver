<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP 200 OK - Success</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 90%;
        }
        
        .status-code {
            font-size: 6rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite alternate;
        }
        
        .status-message {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }
        
        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .details {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: left;
        }
        
        .details h3 {
            margin-bottom: 1rem;
            color: #a8edea;
        }
        
        .details ul {
            list-style: none;
            padding-left: 0;
        }
        
        .details li {
            margin-bottom: 0.5rem;
            padding-left: 1rem;
            position: relative;
        }
        
        .details li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #4ade80;
            font-weight: bold;
        }
        
        .timestamp {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: bounce 1s ease-in-out infinite alternate;
        }
        
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <div class="status-code">200</div>
        <div class="status-message">OK</div>
        <div class="description">
            Your request has been successfully processed! The server has returned the requested resource with no errors.
        </div>
        
        <div class="details">
            <h3>Request Details:</h3>
            <ul>
                <li>Status: Success</li>
                <li>Response Time: <span id="responseTime">0ms</span></li>
                <li>Content Type: text/html</li>
                <li>Server: HTTP/1.1</li>
                <li>Cache Status: Fresh</li>
            </ul>
        </div>
        
        <div class="timestamp">
            <strong>Timestamp:</strong> <span id="currentTime"></span>
        </div>
    </div>

    <script>
        // Update timestamp
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString();
        }
        
        // Simulate response time
        function updateResponseTime() {
            const responseTime = Math.floor(Math.random() * 150) + 50; // 50-200ms
            document.getElementById('responseTime').textContent = responseTime + 'ms';
        }
        
        // Initialize
        updateTime();
        updateResponseTime();
        
        // Update time every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
