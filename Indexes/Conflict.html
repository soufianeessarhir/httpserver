<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>409 - Conflict</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .error-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 90%;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: #e74c3c;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 4px 8px rgba(231, 76, 60, 0.3);
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.05);
            }
        }

        .error-title {
            font-size: 36px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-details {
            background: #f8f9fa;
            border-left: 4px solid #e74c3c;
            padding: 20px;
            margin: 30px 0;
            border-radius: 8px;
            text-align: left;
        }

        .error-details h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .error-details p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .allowed-methods {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .allowed-methods h4 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .method-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .method-tag {
            background: #4caf50;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
        }



        .icon {
            font-size: 24px;
            margin-bottom: 20px;
            color: #e74c3c;
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 40px 20px;
            }
            
            .error-code {
                font-size: 80px;
            }
            
            .error-title {
                font-size: 28px;
            }
            
            .error-message {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="icon">⚔️</div>
        <div class="error-code">409</div>
        <h1 class="error-title">Conflict</h1>
        <p class="error-message">
            The request could not be completed due to a conflict with the current state of the resource.
        </p>
        
        <div class="error-details">
            <h3>What does this mean?</h3>
            <p>The server cannot process your request because it conflicts with the current state of the resource. This often happens with duplicate entries or version conflicts.</p>
        </div>


    </div>


</body>
</html>
