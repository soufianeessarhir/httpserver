<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - Unauthorized</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d3436;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: swing 3s ease-in-out infinite;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        .key-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.8;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .error-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .error-details {
            font-size: 1rem;
            opacity: 0.8;
            font-style: italic;
            margin-bottom: 20px;
        }

        .auth-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .auth-elements::before,
        .auth-elements::after {
            content: '🔐';
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            animation: drift 5s ease-in-out infinite;
        }

        .auth-elements::before {
            top: 25%;
            left: 25%;
            animation-delay: 0s;
        }

        .auth-elements::after {
            bottom: 25%;
            right: 25%;
            animation-delay: 2.5s;
        }

        @keyframes drift {
            0%, 100% { transform: translateX(0px) translateY(0px) rotate(0deg); }
            33% { transform: translateX(-15px) translateY(-15px) rotate(5deg); }
            66% { transform: translateX(15px) translateY(15px) rotate(-5deg); }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 2rem;
            }
            
            .error-message {
                font-size: 1rem;
            }
            
            .container {
                margin: 20px;
                padding: 30px;
            }
            
            .key-icon {
                font-size: 3rem;
            }
            
            .error-details {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-elements"></div>
    
    <div class="container">
        <div class="key-icon">🔑</div>
        <div class="error-code">401</div>
        <h1 class="error-title">Unauthorized</h1>
        <p class="error-message">
            Authentication is required to access this resource. You need to provide valid credentials.
        </p>
        <p class="error-details">
            Please authenticate and try again.
        </p>
    </div>
</body>
</html>
