server {
    listen 127.0.0.1:8000;
    server_name localhost listen root;


    # location / {
    #     methods GET;
    #     root www/;
    # }

    error_page 404 /404.html;
    client_max_body_size 1000000;

    location / {
        index index.html;
        methods POST GET;
        upload_store /Users/sessarhi/Desktop/httpserver/uploads; #need to fix this 
        root /Users/sessarhi/Desktop/httpserver;

    }
    root /Users/sessarhi/Desktop/httpserver;
