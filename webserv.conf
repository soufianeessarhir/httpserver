server {
    listen 127.0.0.1:8000;
    server_name localhost listen root;


    # location / {
    #     methods GET;
    #     root www/;
    # }

    error_page 404 /404.html;
    client_max_body_size 1000000;

    location / {
        index index2.html;
        methods POST GET;
        autoindex on;
        upload_store /home/eaboudi/Desktop/Webserver/UPLOADS; #need to fix this 
        root /home/eaboudi/Desktop/Webserver;

    }
    root /home/eaboudi/Desktop/Webserver;
    #   location /lol {
    #     cgi .php /usr/bin/php;
    #     index index.html;
    #     autoindex on;
    #     methods POST GET;
        # upload_store /home/sessarhi/Desktop/Webserver/; #need to fix this 
    #     root /home/sessarhi/Desktop/Webserver;

    # }
    location /CGI_SCRIPTS
    {
        methods GET POST;
        autoindex on;
        upload_store /home/eaboudi/Desktop/Webserver/UPLOADS;
        cgi .php  /home/eaboudi/Desktop/Webserver/CGI_SCRIPTS/php_cgi;
        cgi .py /usr/bin/python3;
    }
}





